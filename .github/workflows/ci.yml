name: CI - Build and Test

# Trigger workflow on push to main and on all pull requests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel in-progress runs of the same workflow on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Lint and format check
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Setup Node.js environment with pnpm caching
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      # Install project dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run ESLint to check code quality
      - name: Run ESLint
        run: pnpm lint

      # Check code formatting with Prettier
      # - name: Check formatting
      #   run: pnpm format:check

  # Job 2: TypeScript type checking and build
  build:
    name: Build and Type Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run TypeScript compiler without emitting files (type check only)
      - name: TypeScript type check
        run: pnpm test:types

      # Build the project
      - name: Build project
        run: pnpm build

      # Verify codex file and icons were copied to dist/
      - name: Verify codex and icon assets
        run: |
          echo "🔍 Verifying codex file..."
          test -f dist/nodes/ZohoCliq/ZohoCliq.node.json || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliq.node.json" && exit 1)
          echo "✅ Codex file is present"

          echo ""
          echo "🔍 Verifying SVG icon assets (primary)..."
          test -f dist/nodes/ZohoCliq/ZohoCliqNodeIconLight.svg || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliqNodeIconLight.svg" && exit 1)
          test -f dist/nodes/ZohoCliq/ZohoCliqNodeIconDark.svg || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliqNodeIconDark.svg" && exit 1)
          test -f dist/credentials/ZohoCliqCredentialsIconLight.svg || (echo "❌ Missing dist/credentials/ZohoCliqCredentialsIconLight.svg" && exit 1)
          test -f dist/credentials/ZohoCliqCredentialsIconDark.svg || (echo "❌ Missing dist/credentials/ZohoCliqCredentialsIconDark.svg" && exit 1)
          echo "✅ All SVG icon assets are present"

      # Upload build artifacts for potential use in other jobs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # Job 3: Unit Tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  # Job 4: Security audit
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run audit to check for known vulnerabilities
      # Note: Excludes peer dependencies (n8n-core, n8n-workflow) which are maintained by n8n
      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  # Job 5: Validate package.json
  validate-package:
    name: Validate Package
    runs-on: ubuntu-latest
    needs: [build, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Download the build artifacts from the build job
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Validate package tarball
        run: |
          bash .github/scripts/validate-tarball.sh

      # Check that all required files are present
      - name: Verify required files
        run: |
          echo "🔍 Verifying required JavaScript files..."

          test -f dist/nodes/ZohoCliq/ZohoCliq.node.js || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliq.node.js" && exit 1)
          test -f dist/credentials/ZohoCliqOAuth2Api.credentials.js || (echo "❌ Missing dist/credentials/ZohoCliqOAuth2Api.credentials.js" && exit 1)
          echo "✅ All required JavaScript files are present"

          echo ""
          echo "🔍 Verifying codex file..."
          test -f dist/nodes/ZohoCliq/ZohoCliq.node.json || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliq.node.json" && exit 1)
          echo "✅ Codex file is present"

          echo ""
          echo "🔍 Verifying SVG icon assets (primary)..."
          test -f dist/nodes/ZohoCliq/ZohoCliqNodeIconLight.svg || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliqNodeIconLight.svg" && exit 1)
          test -f dist/nodes/ZohoCliq/ZohoCliqNodeIconDark.svg || (echo "❌ Missing dist/nodes/ZohoCliq/ZohoCliqNodeIconDark.svg" && exit 1)
          test -f dist/credentials/ZohoCliqCredentialsIconLight.svg || (echo "❌ Missing dist/credentials/ZohoCliqCredentialsIconLight.svg" && exit 1)
          test -f dist/credentials/ZohoCliqCredentialsIconDark.svg || (echo "❌ Missing dist/credentials/ZohoCliqCredentialsIconDark.svg" && exit 1)
          echo "✅ All SVG icon assets are present"

  # Job 6: Verify no unresolved include markers in generated guide docs
  guide-docs:
    name: Verify Guide Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Check for unresolved include markers
        run: |
          if grep -r '<!-- @include:' AiAgentToolDescriptions/Resources/ --include='*.md' --exclude='*.src.md' -l; then
            echo "ERROR: Unresolved include markers found in committed docs."
            echo "Run 'pnpm docs:build' locally and commit the generated files."
            exit 1
          fi
          echo "All guide docs are clean — no unresolved markers."

  # Final job: Status check (required for branch protection)
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, build, test, security, validate-package, guide-docs]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint job failed"
            exit 1
          fi
          if [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "Build job failed"
            exit 1
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Test job failed"
            exit 1
          fi
          if [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "Security job failed"
            exit 1
          fi
          if [[ "${{ needs.validate-package.result }}" != "success" ]]; then
            echo "Validate package job failed"
            exit 1
          fi
          if [[ "${{ needs.guide-docs.result }}" != "success" ]]; then
            echo "Guide docs job failed"
            exit 1
          fi
          echo "All CI checks passed successfully!"
